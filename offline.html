<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a4731">
  <title>لا يوجد اتصال — سلطان</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: #1a4731;
      color: white;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .icon  { font-size: 4rem; }
    h1     { font-size: 1.4rem; font-weight: 800; color: #e2bb45; }
    p      { font-size: 0.95rem; opacity: 0.8; line-height: 1.7; max-width: 280px; }
    .retry {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #c9a227;
      color: #1a4731;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s;
    }
    .retry:active { opacity: 0.85; }
    .tips {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      font-size: 0.82rem;
      opacity: 0.75;
      line-height: 1.8;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div class="icon">📵</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تحقق من اتصالك بالإنترنت وحاول مرة أخرى</p>

  <button class="retry" onclick="window.location.reload()">
    🔄 إعادة المحاولة
  </button>

  <div class="tips">
    💡 يمكنك تصفح سلتك والمفضلة بدون إنترنت<br>
    لكن تحتاج اتصال لعرض المنتجات وإرسال الطلبات
  </div>
</body>
</html>
